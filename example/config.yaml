site:
  url: "http://127.0.0.1:8000"
  title: "snow"
  language: "zh"

mode.publish:
  site:
    url: "https://honmaple.me"
  languages.en:
    site.url: "http://honmaple.me/en"

# languages.en:
#   site:
#     url: "http://127.0.0.1:8000/en"
#   output_dir: "output/en"

sections:
  _default:
    path: ""
    templates: "posts.html"
    page_template: "page.html"
  posts:
    path: "posts/index.html"
    paginate_filter: ""
    page_path: "articles/{date:%Y}/{date:%m}/{slug}.html"
    # page_template: "post.html"
  pages:
    path: ""
    page_path: "pages/{slug}.html"
    hidden: true

taxonomies:
  tags:
    template: "tags/list.html"
    term_template: "tags/single.html"
  authors:
    template: "tags/list.html"
    term_template: "tags/single.html"

output_dir: "output"
content_dir: "content"

ignored_static:
  - js/encrypt.js

statics:
  robots.txt:
    path: "robots.txt"
