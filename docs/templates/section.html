{% extends "index.html" %}

{% block title %}
  {{ section.Title }} | {{ config.title }}
{% endblock title %}

{% block content %}
  <header class="mb-8">
    <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100 sm:text-4xl">{{ section.Title }}</h1>
  </header>
  {{ section.Content | safe }}

  {% if section.Pages %}
    <div class="mt-12 grid grid-cols-1 gap-6 sm:grid-cols-2">
      {% for p in section.Pages %}
        <a href="{{ p.Permalink }}" class="group block p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg hover:border-primary-500 dark:hover:border-primary-500 transition-colors">
          <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100 group-hover:text-primary-600 dark:group-hover:text-primary-400">{{ p.Title }}</h3>
        </a>
      {% endfor %}
    </div>
  {% endif %}
{% endblock content %}
